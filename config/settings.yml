agent:
  name: hello-rag-agent
  max_steps: 6
  history_turns: 6

knowledge_base:
  data_dir: data
  supported_extensions:
    - .txt
    - .md
    - .pdf
  chunk_size: 600
  chunk_overlap: 120
  atomic_chunking_enabled: true
  atomic_chunk_max_chars: 320
  top_k: 4
  retrieval_mode: hybrid
  rerank_pool_size: 12
  reranker_enabled: true
  reranker_semantic_weight: 0.55
  max_query_variants: 6
  query_rewrite_enabled: true
  query_rewrite_model: tongyi-xiaomi-analysis-pro
  query_rewrite_max_keywords: 6
  max_evidence_points: 4
  snippet_max_chars: 220
  vector_store_dir: data/chroma_db
  collection_name: hello_rag_agent_kb
  embedding_model: text-embedding-v4
  embedding_dimensions: 1024

llm:
  model: tongyi-xiaomi-analysis-pro
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  temperature: 0.0
  max_tokens: 1200

memory:
  db_path: data/memory.db
  working_max_entries: 80
  working_ttl_minutes: 240
  default_top_k: 4
  profile_enabled: true
  profile_max_facts: 50
  assistant_memory_min_chars: 20
